services:
  postgres:
    image: postgres:15
    container_name: novel_pg
    environment:
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novelpass
      POSTGRES_DB: novel
    ports:
      - "5433:5432"
    volumes:
      - novel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel -d novel"]
      interval: 10s
      timeout: 5s
      retries: 8

  neo4j:
    image: neo4j:5.26
    container_name: novel_neo4j
    environment:
      NEO4J_AUTH: neo4j/novelgraphpass
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - novel_neo4j_data:/data
      - novel_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: novel_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - novel_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  historian-mcp-bridge:
    build:
      context: .
      dockerfile: Dockerfile.historian
    container_name: novel_historian_bridge
    working_dir: /app
    environment:
      HISTORIAN_BRIDGE_HOST: 0.0.0.0
      HISTORIAN_BRIDGE_PORT: "8090"
      HISTORIAN_QDRANT_URL: http://qdrant:6333
      HISTORIAN_NEO4J_HTTP_URL: http://neo4j:7474/db/neo4j/tx/commit
      HISTORIAN_NEO4J_USER: neo4j
      HISTORIAN_NEO4J_PASSWORD: novelgraphpass
      HISTORIAN_BRIDGE_TIMEOUT_SECONDS: "10"
    ports:
      - "8090:8090"
    depends_on:
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: novel_grafana
    ports:
      - "3000:3000"
    volumes:
      - novel_grafana_data:/var/lib/grafana
    depends_on:
      - postgres

  db-migrate:
    image: postgres:15
    container_name: novel_db_migrate
    environment:
      PGPASSWORD: novelpass
    volumes:
      - ../db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -lc
      - |
        set -eu
        baseline_count="$(psql -h postgres -U novel -d novel -tAc "SELECT count(*) FROM pg_tables WHERE schemaname = 'public' AND tablename = 'story_series'")"
        for file in /migrations/*.sql; do
          name="$$(basename "$$file")"
          if [ "$$baseline_count" = "1" ] && [ "$$name" = "000_baseline_20260502.sql" ]; then
            echo "Skipping $$name because public.story_series already exists."
            continue
          fi
          echo "Applying $$name"
          psql -h postgres -U novel -d novel -v ON_ERROR_STOP=1 -f "$$file"
        done

  novel-studio:
    build:
      context: ../apps/studio
      dockerfile: Dockerfile
    container_name: novel_studio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://novel:novelpass@postgres:5432/novel
      LLM_API_BASE: http://host.docker.internal:8080/v1
      LLM_MODEL: qwen2.5-7b
      LLM_API_KEY: local
      HISTORIAN_MCP_BASE_URL: http://historian-mcp-bridge:8090
      HISTORIAN_QDRANT_ENABLED: "1"
      HISTORIAN_NEO4J_ENABLED: "1"
    ports:
      - "3001:3000"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      historian-mcp-bridge:
        condition: service_healthy
volumes:
  novel_pg_data:
  novel_grafana_data:
  novel_neo4j_data:
  novel_neo4j_logs:
  novel_qdrant_data:
